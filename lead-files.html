<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lead Files — Sunset Horizons</title>
<style>
  :root {
    --bg: #0f1418; --panel: #171e24; --border: #2a333b; --text: #e7edf2;
    --muted: #93a3af; --accent: #f2a900; --accent2: #4fa3e0; --good: #4caf7d; --bad: #e05a5a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--text); }
  header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
  header a.back { color: var(--accent2); text-decoration: none; font-size: 0.85rem; }
  header a.back:hover { text-decoration: underline; }
  header h1 { margin: 8px 0 4px; font-size: 1.3rem; }
  header p { margin: 0; color: var(--muted); font-size: 0.9rem; }
  main { max-width: 1000px; margin: 0 auto; padding: 20px 24px 60px; }
  button, input { font-size: 0.95rem; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: #1d262d; color: var(--text); font-family: inherit; }
  button { background: var(--accent); color: #1a1200; font-weight: 600; border: none; cursor: pointer; }
  button:hover { filter: brightness(1.08); }
  button.secondary { background: #1d262d; color: var(--text); border: 1px solid var(--border); }
  button.danger { background: var(--bad); color: #fff; }
  button.small { font-size: 0.78rem; padding: 6px 10px; }
  #dropZone { border: 2px dashed var(--border); border-radius: 12px; padding: 30px 20px; text-align: center; color: var(--muted); margin-bottom: 8px; transition: all 0.15s; cursor: pointer; }
  #dropZone.dragover { border-color: var(--accent); background: rgba(242, 169, 0, 0.06); color: var(--text); }
  #dropZone p { margin: 0; font-size: 0.9rem; }
  #fileInput { display: none; }
  #uploadStatus { color: var(--muted); font-size: 0.85rem; min-height: 1.2em; margin-bottom: 20px; }
  #uploadStatus.error { color: var(--bad); }
  .files-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
  .file-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
  .file-card .preview { width: 100%; height: 110px; border-radius: 6px; background: #1d262d; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 8px; }
  .file-card .preview img { width: 100%; height: 100%; object-fit: cover; }
  .file-card .preview .icon { font-size: 2.2rem; }
  .file-card .name { font-size: 0.8rem; word-break: break-word; margin-bottom: 4px; }
  .file-card .size { color: var(--muted); font-size: 0.72rem; margin-bottom: 10px; }
  .file-card .row { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
  #status { color: var(--muted); font-size: 0.9rem; padding: 30px 0; text-align: center; }
  #status.error { color: var(--bad); }
  #emptyState { color: var(--muted); font-size: 0.9rem; padding: 30px 0; text-align: center; display: none; }
</style>
<link rel="stylesheet" href="gate.css">
</head>
<body>
<div id="gate">
  <div class="gate-card">
    <h2>Sunset Horizons</h2>
    <p>Enter the passphrase to continue.</p>
    <input type="password" id="gatePassphrase" placeholder="Passphrase" autocomplete="off">
    <button id="gateSubmit">Unlock</button>
    <div id="gateError"></div>
  </div>
</div>
<div id="appContent">
<header>
  <a class="back" href="hub.html">← Back to Leads</a>
  <h1 id="leadAddr">Loading…</h1>
  <p>Documents, photos, and other files for this lead.</p>
</header>
<main>
  <div id="dropZone">
    <p><strong>Click to choose files</strong> or drag and drop here</p>
    <input type="file" id="fileInput" multiple>
  </div>
  <div id="uploadStatus"></div>

  <div id="status">Loading files…</div>
  <div id="emptyState">No files yet — upload something above.</div>
  <div class="files-grid" id="filesGrid"></div>
</main>
</div>

<script src="gate.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-config.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const leadId = new URLSearchParams(window.location.search).get('id');
const BUCKET = 'lead-files';

function humanFileSize(bytes) {
  if (bytes == null) return '';
  const units = ['B', 'KB', 'MB', 'GB'];
  let i = 0, val = bytes;
  while (val >= 1024 && i < units.length - 1) { val /= 1024; i++; }
  return `${val.toFixed(val < 10 && i > 0 ? 1 : 0)} ${units[i]}`;
}

function displayName(objectName) {
  return objectName.replace(/^\d+-/, '');
}

function isImage(mimetype) {
  return typeof mimetype === 'string' && mimetype.startsWith('image/');
}

function publicUrl(objectName) {
  return supabaseClient.storage.from(BUCKET).getPublicUrl(`${leadId}/${objectName}`).data.publicUrl;
}

function renderFileCard(obj) {
  const name = displayName(obj.name);
  const size = humanFileSize(obj.metadata ? obj.metadata.size : null);
  const mimetype = obj.metadata ? obj.metadata.mimetype : '';
  const url = publicUrl(obj.name);

  const preview = isImage(mimetype)
    ? `<img src="${url}" alt="${name}">`
    : `<span class="icon">📄</span>`;

  return `
    <div class="file-card">
      <div class="preview">${preview}</div>
      <div class="name">${name}</div>
      <div class="size">${size}</div>
      <div class="row">
        <a href="${url}" target="_blank"><button class="small secondary" type="button">View</button></a>
        <button class="small secondary" onclick="downloadFile('${obj.name}')">Download</button>
        <button class="small danger" onclick="deleteFile('${obj.name}')">Delete</button>
      </div>
    </div>`;
}

async function loadFiles() {
  const { data, error } = await supabaseClient.storage.from(BUCKET).list(leadId, {
    sortBy: { column: 'created_at', order: 'desc' },
  });

  $('status').style.display = 'none';

  if (error) {
    $('status').textContent = 'Could not load files: ' + error.message;
    $('status').className = 'error';
    $('status').style.display = 'block';
    return;
  }

  const files = (data || []).filter(f => f.id); // folders/placeholders have no id
  if (files.length === 0) {
    $('emptyState').style.display = 'block';
    $('filesGrid').innerHTML = '';
    return;
  }
  $('emptyState').style.display = 'none';
  $('filesGrid').innerHTML = files.map(renderFileCard).join('');
}

async function uploadFiles(fileList) {
  $('uploadStatus').className = '';
  const files = Array.from(fileList);
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    $('uploadStatus').textContent = `Uploading ${i + 1} of ${files.length}: ${file.name}…`;
    const objectName = `${Date.now()}-${file.name}`;
    const { error } = await supabaseClient.storage.from(BUCKET).upload(`${leadId}/${objectName}`, file);
    if (error) {
      $('uploadStatus').textContent = `Error uploading ${file.name}: ${error.message}`;
      $('uploadStatus').className = 'error';
      return;
    }
  }
  $('uploadStatus').textContent = `Uploaded ${files.length} file${files.length === 1 ? '' : 's'}.`;
  await loadFiles();
}

async function downloadFile(objectName) {
  const { data, error } = await supabaseClient.storage.from(BUCKET).download(`${leadId}/${objectName}`);
  if (error) { alert('Error downloading: ' + error.message); return; }
  const url = URL.createObjectURL(data);
  const a = document.createElement('a');
  a.href = url;
  a.download = displayName(objectName);
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

async function deleteFile(objectName) {
  if (!confirm(`Delete "${displayName(objectName)}"? This can't be undone.`)) return;
  const { error } = await supabaseClient.storage.from(BUCKET).remove([`${leadId}/${objectName}`]);
  if (error) { alert('Error deleting: ' + error.message); return; }
  await loadFiles();
}

$('dropZone').addEventListener('click', () => $('fileInput').click());
$('fileInput').addEventListener('change', (e) => {
  if (e.target.files.length) uploadFiles(e.target.files);
  e.target.value = '';
});
$('dropZone').addEventListener('dragover', (e) => { e.preventDefault(); $('dropZone').classList.add('dragover'); });
$('dropZone').addEventListener('dragleave', () => $('dropZone').classList.remove('dragover'));
$('dropZone').addEventListener('drop', (e) => {
  e.preventDefault();
  $('dropZone').classList.remove('dragover');
  if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
});

async function init() {
  if (!leadId) {
    $('leadAddr').textContent = 'No lead specified';
    $('status').textContent = 'This link is missing a lead id.';
    $('status').className = 'error';
    return;
  }
  const { data: lead } = await supabaseClient.from('leads').select('address').eq('id', leadId).single();
  $('leadAddr').textContent = lead ? lead.address : 'Lead not found';
  await loadFiles();
}

init();
</script>
</body>
</html>
