<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contractors — Sunset Horizons</title>
<style>
  :root {
    --bg: #0f1418; --panel: #171e24; --border: #2a333b; --text: #e7edf2;
    --muted: #93a3af; --accent: #f2a900; --accent2: #4fa3e0; --good: #4caf7d; --bad: #e05a5a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--text); }
  header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  header h1 { margin: 0 0 4px; font-size: 1.3rem; }
  header p { margin: 0; color: var(--muted); font-size: 0.9rem; }
  main { max-width: 1100px; margin: 0 auto; padding: 20px 24px 60px; }
  button, input { font-size: 0.95rem; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: #1d262d; color: var(--text); font-family: inherit; }
  button { background: var(--accent); color: #1a1200; font-weight: 600; border: none; cursor: pointer; }
  button:hover { filter: brightness(1.08); }
  button.secondary { background: #1d262d; color: var(--text); border: 1px solid var(--border); }
  button.danger { background: var(--bad); color: #fff; }
  button.small { font-size: 0.78rem; padding: 6px 10px; }
  section.block { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 20px; }
  section.block h2 { margin: 0 0 12px; font-size: 1rem; }
  .add-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; align-items: end; }
  .add-form label { display: block; font-size: 0.76rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 4px; }
  .add-form input { width: 100%; }
  #addStatus { color: var(--bad); font-size: 0.85rem; margin-top: 10px; min-height: 1.2em; }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  th { color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
  tr:last-child td { border-bottom: none; }
  td.logo img { width: 40px; height: 40px; border-radius: 6px; object-fit: contain; background: #fff; }
  td.code { color: var(--muted); font-family: monospace; font-size: 0.82rem; }
  .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .edit-status { color: var(--bad); font-size: 0.76rem; margin-top: 4px; }
  #status { color: var(--muted); font-size: 0.9rem; padding: 30px 0; text-align: center; }
  #status.error { color: var(--bad); }
  #emptyState { color: var(--muted); font-size: 0.9rem; padding: 20px 0; text-align: center; display: none; }
  #tableWrap { display: none; overflow-x: auto; }
</style>
<link rel="stylesheet" href="gate.css">
<link rel="stylesheet" href="nav.css">
</head>
<body>
<div id="gate">
  <div class="gate-card">
    <h2>Sunset Horizons</h2>
    <p>Enter the passphrase to continue.</p>
    <input type="password" id="gatePassphrase" placeholder="Passphrase" autocomplete="off">
    <button id="gateSubmit">Unlock</button>
    <div id="gateError"></div>
  </div>
</div>
<div id="appContent">
<nav id="mainNav" class="main-nav"></nav>
<header>
  <div>
    <h1>Contractors</h1>
    <p>Who leads get sent to.</p>
  </div>
</header>
<main>
  <section class="block">
    <h2>Add a contractor</h2>
    <div class="add-form">
      <div>
        <label for="newName">Name</label>
        <input type="text" id="newName" placeholder="Example Contracting Co.">
      </div>
      <div>
        <label for="newCode">Code (unique, auto-filled)</label>
        <input type="text" id="newCode" placeholder="example-co">
      </div>
      <div>
        <label for="newPhone">Phone (for tel: links)</label>
        <input type="text" id="newPhone" placeholder="+17575551234">
      </div>
      <div>
        <label for="newPhoneDisplay">Phone (displayed)</label>
        <input type="text" id="newPhoneDisplay" placeholder="(757) 555-1234">
      </div>
      <div>
        <label for="newLogoUrl">Logo URL</label>
        <input type="text" id="newLogoUrl" placeholder="logos/example-co.svg">
      </div>
      <div>
        <button id="addBtn">Add contractor</button>
      </div>
    </div>
    <div id="addStatus"></div>
  </section>

  <div id="status">Loading contractors…</div>
  <div id="emptyState">No contractors yet — add one above.</div>

  <div id="tableWrap">
    <table>
      <thead>
        <tr>
          <th>Logo</th>
          <th>Name</th>
          <th>Code</th>
          <th>Phone</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="contractorsBody"></tbody>
    </table>
  </div>
</main>
</div>

<script src="gate.js"></script>
<script src="nav.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-config.js"></script>
<script>
renderNav('contractors');

let allContractors = [];
let editingCode = null;

function slugify(text) {
  return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '').slice(0, 40);
}

document.getElementById('newName').addEventListener('input', (e) => {
  document.getElementById('newCode').value = slugify(e.target.value);
});

function renderRow(c) {
  if (editingCode === c.code) {
    return `
      <tr>
        <td class="logo"><img src="${c.logo_url || ''}" alt="" onerror="this.style.visibility='hidden'"></td>
        <td><input type="text" id="edit-name-${c.code}" value="${c.name.replace(/"/g, '&quot;')}"></td>
        <td class="code">${c.code}</td>
        <td>
          <input type="text" id="edit-phone-${c.code}" value="${c.phone.replace(/"/g, '&quot;')}" placeholder="+17575551234" style="margin-bottom:4px;">
          <input type="text" id="edit-phone-display-${c.code}" value="${c.phone_display.replace(/"/g, '&quot;')}" placeholder="(757) 555-1234">
          <input type="text" id="edit-logo-${c.code}" value="${(c.logo_url || '').replace(/"/g, '&quot;')}" placeholder="Logo URL" style="margin-top:4px;">
        </td>
        <td>
          <div class="row-actions">
            <button class="small" onclick="saveEdit('${c.code}')">Save</button>
            <button class="small secondary" onclick="cancelEdit()">Cancel</button>
          </div>
          <div class="edit-status" id="edit-status-${c.code}"></div>
        </td>
      </tr>`;
  }

  return `
    <tr>
      <td class="logo"><img src="${c.logo_url || ''}" alt="" onerror="this.style.visibility='hidden'"></td>
      <td>${c.name}</td>
      <td class="code">${c.code}</td>
      <td>${c.phone_display}</td>
      <td>
        <div class="row-actions">
          <button class="small secondary" onclick="startEdit('${c.code}')">Edit</button>
          <button class="small danger" onclick="deleteContractor('${c.code}')">Delete</button>
        </div>
      </td>
    </tr>`;
}

function renderRows() {
  document.getElementById('contractorsBody').innerHTML = allContractors.map(renderRow).join('');
}

function startEdit(code) { editingCode = code; renderRows(); }
function cancelEdit() { editingCode = null; renderRows(); }

async function saveEdit(code) {
  const name = document.getElementById(`edit-name-${code}`).value.trim();
  const phone = document.getElementById(`edit-phone-${code}`).value.trim();
  const phoneDisplay = document.getElementById(`edit-phone-display-${code}`).value.trim();
  const logoUrl = document.getElementById(`edit-logo-${code}`).value.trim();
  const statusEl = document.getElementById(`edit-status-${code}`);

  if (!name || !phone || !phoneDisplay) { statusEl.textContent = 'Name, phone, and displayed phone are required.'; return; }

  statusEl.textContent = 'Saving…';
  const { error } = await supabaseClient
    .from('contractors')
    .update({ name, phone, phone_display: phoneDisplay, logo_url: logoUrl || null })
    .eq('code', code);

  if (error) { statusEl.textContent = 'Error: ' + error.message; return; }

  const c = allContractors.find(x => x.code === code);
  c.name = name; c.phone = phone; c.phone_display = phoneDisplay; c.logo_url = logoUrl || null;
  editingCode = null;
  renderRows();
}

async function deleteContractor(code) {
  if (!confirm(`Delete "${code}"? Leads already assigned to this contractor will keep showing this code, but it will no longer resolve to a name/phone/logo.`)) return;
  const { error } = await supabaseClient.from('contractors').delete().eq('code', code);
  if (error) { alert('Error deleting: ' + error.message); return; }
  allContractors = allContractors.filter(c => c.code !== code);
  renderRows();
  if (allContractors.length === 0) {
    document.getElementById('tableWrap').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
  }
}

async function addContractor() {
  const name = document.getElementById('newName').value.trim();
  const code = document.getElementById('newCode').value.trim();
  const phone = document.getElementById('newPhone').value.trim();
  const phoneDisplay = document.getElementById('newPhoneDisplay').value.trim();
  const logoUrl = document.getElementById('newLogoUrl').value.trim();
  const statusEl = document.getElementById('addStatus');

  if (!name || !code || !phone || !phoneDisplay) {
    statusEl.textContent = 'Name, code, phone, and displayed phone are required.';
    return;
  }
  if (allContractors.some(c => c.code === code)) {
    statusEl.textContent = `Code "${code}" is already in use — pick a different one.`;
    return;
  }

  statusEl.textContent = 'Adding…';
  const { data, error } = await supabaseClient
    .from('contractors')
    .insert({ code, name, phone, phone_display: phoneDisplay, logo_url: logoUrl || null })
    .select()
    .single();

  if (error) { statusEl.textContent = 'Error: ' + error.message; return; }

  allContractors.push(data);
  statusEl.textContent = '';
  ['newName', 'newCode', 'newPhone', 'newPhoneDisplay', 'newLogoUrl'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('status').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('tableWrap').style.display = 'block';
  renderRows();
}

document.getElementById('addBtn').addEventListener('click', addContractor);

async function loadContractorsTable() {
  const statusEl = document.getElementById('status');
  const { data, error } = await supabaseClient.from('contractors').select('*').order('name');

  if (error) {
    statusEl.textContent = 'Could not load contractors: ' + error.message;
    statusEl.className = 'error';
    return;
  }

  statusEl.style.display = 'none';
  allContractors = data || [];

  if (allContractors.length === 0) {
    document.getElementById('emptyState').style.display = 'block';
    return;
  }

  document.getElementById('tableWrap').style.display = 'block';
  renderRows();
}

loadContractorsTable();
</script>
</body>
</html>
